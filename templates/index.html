<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SchoolTrack">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>SchoolTrack Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#1a73e8;--primary-dark:#1557b0;--primary-light:#e8f0fe;
  --green:#34a853;--red:#ea4335;--amber:#fbbc04;--purple:#9334e6;
  --bg:#f8f9fa;--card:#fff;--border:#e0e0e0;--text:#202124;--muted:#5f6368;
  --font:'Segoe UI',Roboto,sans-serif;--r:12px;--shadow:0 2px 8px rgba(0,0,0,.12);
}
*{font-family:var(--font)}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a73e8,#0d47a1);z-index:1000;padding:16px}
#login-screen.hide{display:none}
.login-card{background:#fff;border-radius:24px;padding:36px 28px;max-width:380px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:24px;font-weight:700;color:#1a73e8;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.inp-group{margin-bottom:14px;text-align:left}
.inp-group label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.inp-group input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;transition:.2s}
.inp-group input:focus{border-color:var(--primary)}
.btn-login{width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;transition:.2s;margin-top:4px}
.btn-login:hover{background:var(--primary-dark)}
.login-toggle{font-size:13px;color:var(--muted);margin-top:16px}
.login-toggle span{color:var(--primary);cursor:pointer;font-weight:600}
.login-err{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative}
#app.show{display:flex}

/* TOP BAR */
.topbar{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.tb-school{font-size:11px;opacity:.85;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-date{font-size:11px;opacity:.8}
.tb-logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}

/* NAV TABS */
.nav-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:48px;z-index:99}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{flex:1;min-width:60px;padding:10px 8px 8px;border:none;background:none;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;transition:.15s}
.ntab.on{color:var(--primary);border-bottom-color:var(--primary)}
.ntab .ti{font-size:18px}
